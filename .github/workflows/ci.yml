name: Clickbait Detector CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-and-train:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ───────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Lint (fast, non-blocking) ──────────────────────────────────────
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ app.py --max-line-length=120 --ignore=E203,W503 || true

      # ── 5. Run unit tests ─────────────────────────────────────────────────
      - name: Run unit tests (pre-training)
        run: |
          cd clickbait_detector 2>/dev/null || true
          pytest tests/ -v -k "not EndToEnd" --tb=short

      # ── 6. DVC pull (if remote configured) ───────────────────────────────
      - name: Pull DVC data
        run: |
          pip install dvc
          dvc pull --no-run-cache 2>/dev/null || echo "DVC remote not configured — using committed data"

      # ── 7. Train model ────────────────────────────────────────────────────
      - name: Train model
        run: |
          python src/train.py
        env:
          MLFLOW_TRACKING_URI: "file:./mlruns"

      # ── 8. Run full test suite (including end-to-end) ────────────────────
      - name: Run full test suite
        run: |
          pytest tests/ -v --tb=short

      # ── 9. Check model metrics ────────────────────────────────────────────
      - name: Validate model accuracy
        run: |
          python -c "
          import json
          with open('models/metrics.json') as f:
              m = json.load(f)
          print('Metrics:', m)
          assert m['accuracy'] >= 0.70, f'Accuracy too low: {m[\"accuracy\"]}'
          assert m['f1'] >= 0.65, f'F1 too low: {m[\"f1\"]}'
          print('All metric checks passed.')
          "

      # ── 10. Upload model artefacts ────────────────────────────────────────
      - name: Upload model artefacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/classifier.pkl
            models/feature_pipeline.pkl
            models/metrics.json
          retention-days: 30

  # ── Docker build (runs only on main branch push) ──────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-train
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download model artefacts
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Build Docker image
        run: |
          docker build -t clickbait-detector:latest .

      - name: Smoke test Docker image
        run: |
          docker run -d -p 8000:8000 --name test-container clickbait-detector:latest
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-container && exit 1)
          docker stop test-container
